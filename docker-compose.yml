services:
  web:
    build: .           
    volumes:
      - ./www:/var/www/html
    ports:
      - "8080:80"
    networks:
      - app-network

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    environment:
      LDAP_ORGANISATION: "Test Org"
      LDAP_DOMAIN: "ssib.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
    networks:
      - app-network
    volumes:
      - ./ldap_data:/var/lib/ldap
      - ./ldap_config:/etc/ldap/slapd.d

  db:
    build:
      context: .
      dockerfile: mysql.Dockerfile
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: husd_alfa
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - app-network
    volumes:
      - ./init-user.sql:/docker-entrypoint-initdb.d/init-user.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - app-network

networks:
  app-network:
    driver: bridge